<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos - Watch Repair Tracker MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- Login Section -->
    <div id="login-container" class="login-container">
        <div class="login-card glass-panel">
            <div class="logo">
                <i class="fa-solid fa-clock"></i>
                <h1>Chronos <span>Tracker</span></h1>
            </div>
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Please login to manage repairs</p>
            <form id="form-login">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="admin@chronos.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary btn-full">Login</button>
            </form>
            <div class="login-footer">
                <p id="auth-error" class="error-text hidden"></p>
                <button id="btn-forgot-password" class="btn-link">Forgot Password?</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <!-- Sidebar / Header -->
        <header class="glass-panel main-header">
            <div class="logo">
                <i class="fa-solid fa-clock"></i>
                <h1>Chronos <span>Tracker</span></h1>
            </div>
            <p class="tagline">Premium Repair Management</p>
            <div class="header-actions">
                <button id="btn-theme-toggle" class="btn-theme-toggle" title="Toggle Light/Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div class="user-info-sidebar">
                    <div class="user-badge">
                        <i class="fa-solid fa-user-circle"></i>
                        <span id="user-role">Admin</span>
                    </div>
                    <button id="btn-logout" class="btn-logout">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Dashboard Stats -->
            <section class="dashboard-stats">
                <div class="stat-card glass-panel">
                    <div class="stat-icon"><i class="fa-solid fa-list-check"></i></div>
                    <div class="stat-info">
                        <h3>Total Repairs</h3>
                        <p id="stat-total">0</p>
                    </div>
                </div>
                <div class="stat-card glass-panel">
                    <div class="stat-icon warning"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <div class="stat-info">
                        <h3>In Progress</h3>
                        <p id="stat-progress">0</p>
                    </div>
                </div>
                <div class="stat-card glass-panel">
                    <div class="stat-icon success"><i class="fa-solid fa-bell-concierge"></i></div>
                    <div class="stat-info">
                        <h3>Ready for Pickup</h3>
                        <p id="stat-ready">0</p>
                    </div>
                </div>
            </section>

            <!-- Filters Section -->
            <section class="filters-section glass-panel">
                <div class="filter-group">
                    <label for="search-input"><i class="fa-solid fa-magnifying-glass"></i> Search</label>
                    <input type="text" id="search-input" placeholder="Name or Repair ID...">
                </div>
                <div class="filter-group">
                    <label for="date-start"><i class="fa-solid fa-calendar"></i> From</label>
                    <input type="date" id="date-start">
                </div>
                <div class="filter-group">
                    <label for="date-end"><i class="fa-solid fa-calendar"></i> To</label>
                    <input type="date" id="date-end">
                </div>
                <div class="filter-group">
                    <button id="btn-clear-filters" class="btn-link">Clear All</button>
                </div>
            </section>

            <!-- Actions -->
            <section class="actions-section">
                <h2>Recent Repairs</h2>
                <div class="action-buttons" style="display: flex; gap: 1rem;">
                    <button id="btn-export" class="btn-outline">
                        <i class="fa-solid fa-file-excel" style="color: var(--success)"></i> Export to Excel
                    </button>
                    <button id="btn-add-repair" class="btn-primary">
                        <i class="fa-solid fa-plus"></i> New Repair
                    </button>
                </div>
            </section>

            <!-- Tracker List -->
            <section class="tracker-section class-panel">
                <div class="table-container glass-panel">
                    <table id="repairs-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Date</th>
                                <th>Details</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Finance</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="repairs-list">
                            <!-- Rows will be injected by JS -->
                        </tbody>
                    </table>
                    
                    <!-- Pagination Controls -->
                    <div id="pagination-controls" class="pagination-controls">
                        <button id="btn-prev" class="btn-icon circle"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="page-info">Page 1 of 1</span>
                        <button id="btn-next" class="btn-icon circle"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div id="empty-state" class="empty-state hidden">
                        <i class="fa-regular fa-folder-open"></i>
                        <p>No repairs tracked yet.</p>
                        <button class="btn-outline" onclick="document.getElementById('btn-add-repair').click()">Add your
                            first repair</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Repair Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>New Repair Log</h2>
                <button id="btn-close-modal" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="form-repair">
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="repairDate">Date Created</label>
                        <input type="date" id="repairDate" required>
                    </div>
                    <div class="form-group flex-1">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="repairId">Receipt # / Repair ID</label>
                        <input type="text" id="repairId" required placeholder="e.g. WR-001">
                    </div>
                    <div class="form-group flex-1">
                        <label for="priority">Priority</label>
                        <select id="priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="receivedBy">Received By (Your name)</label>
                    <input type="text" id="receivedBy" required placeholder="Who is taking this order?">
                </div>
                <div class="form-group">
                    <label for="customerName">Customer Name</label>
                    <input type="text" id="customerName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="customerPhone">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <span class="phone-prefix">+91</span>
                        <input type="tel" id="customerPhone" required placeholder="98765 43210">
                    </div>
                </div>
                <div class="form-group">
                    <label for="watchModel">Watch Make & Model</label>
                    <input type="text" id="watchModel" required placeholder="Rolex Submariner">
                </div>
                <div class="form-group">
                    <label for="issueDesc">Issue Description</label>
                    <textarea id="issueDesc" rows="3" required
                        placeholder="Broken crystal, needs cleaning..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="estCost">Total Cost (₹)</label>
                        <input type="number" id="estCost" min="0" step="0.01" required placeholder="1500.00">
                    </div>
                    <div class="form-group flex-1">
                        <label for="advancePaid">Advance Paid (₹)</label>
                        <input type="number" id="advancePaid" min="0" step="0.01" value="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="watchPhotoBefore">Before Photo</label>
                        <div class="photo-upload-wrapper">
                            <label for="watchPhotoBefore" class="photo-upload-label">
                                <i class="fa-solid fa-camera"></i> <span>Before</span>
                                <input type="file" id="watchPhotoBefore" accept="image/*" class="hidden">
                            </label>
                            <div id="preview-before-container" class="photo-preview hidden">
                                <img id="preview-before" src="" alt="Before">
                                <button type="button" class="btn-remove-photo" data-target="watchPhotoBefore"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="form-group flex-1">
                        <label for="watchPhotoAfter">After Photo</label>
                        <div class="photo-upload-wrapper">
                            <label for="watchPhotoAfter" class="photo-upload-label">
                                <i class="fa-solid fa-camera-rotate"></i> <span>After</span>
                                <input type="file" id="watchPhotoAfter" accept="image/*" class="hidden">
                            </label>
                            <div id="preview-after-container" class="photo-preview hidden">
                                <img id="preview-after" src="" alt="After">
                                <button type="button" class="btn-remove-photo" data-target="watchPhotoAfter"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-outline" id="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-primary">Save Repair</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
